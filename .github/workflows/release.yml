name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (example: v1.0.0)"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: windows
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ matrix.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ matrix.os }}-go-

      # 🐧 Linux deps
      - name: Install dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            libgl1-mesa-dev \
            xorg-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev

      # 🐧 Build Linux
      - name: Build (Linux)
        if: matrix.os == 'linux'
        run: |
          mkdir -p build
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -o build/app main.go

      # 🪟 Build Windows
      - name: Build (Windows)
        if: matrix.os == 'windows'
        run: |
          mkdir build
          go build -ldflags="-H=windowsgui" -o build/app.exe main.go

      # 🐧 Zip Linux (fix overwrite)
      - name: Archive (Linux)
        if: matrix.os == 'linux'
        run: |
          rm -f app-linux.zip
          cd build
          zip -r ../app-linux.zip .

      # 🪟 Zip Windows (fix overwrite)
      - name: Archive (Windows)
        if: matrix.os == 'windows'
        run: |
          if (Test-Path app-windows.zip) { Remove-Item app-windows.zip }
          Compress-Archive -Path build\* -DestinationPath app-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.os }}
          path: app-${{ matrix.os }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Debug files
        run: ls -R

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: |
            **/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
