name: Build Go (Fyne)

on:
  workflow_dispatch:   # กด run เองก่อน

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, windows]
        goarch: [amd64]

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    # 🔥 ติดตั้ง lib ที่ Fyne ต้องใช้
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gcc \
          libgl1-mesa-dev \
          xorg-dev \
          libx11-dev \
          libxcursor-dev \
          libxrandr-dev \
          libxinerama-dev \
          libxi-dev

    - name: Build
      run: |
        mkdir build

        if [ "${{ matrix.goos }}" = "windows" ]; then
          GOOS=windows GOARCH=amd64 CGO_ENABLED=1 go build -o build/app.exe main.go
        else
          GOOS=linux GOARCH=amd64 CGO_ENABLED=1 go build -o build/app main.go
        fi

    - uses: actions/upload-artifact@v4
      with:
        name: app-${{ matrix.goos }}
        path: build/
