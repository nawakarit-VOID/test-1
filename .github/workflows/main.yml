name: Build Go Binary

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [windows, linux]
        goarch: [amd64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Build
      run: |
        mkdir build
        if [ "${{ matrix.goos }}" = "windows" ]; then
          GOOS=windows GOARCH=${{ matrix.goarch }} go build -o build/app.exe main.go
        else
          GOOS=linux GOARCH=${{ matrix.goarch }} go build -o build/app main.go
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ matrix.goos }}
        path: build/
